# roles/launch_app/tasks/main.yml
---

- name: Launch Backend API
  docker_container:
    name: my-backend-container
    image: lstiffel/my-backend:latest
    pull: true          # <-- Force Ansible à chercher la nouvelle image sur DockerHub
    restart_policy: on-failure
    restart_retries: 3
    networks:
      - name: app-network
      - name: proxy-network
    env:
      # Ton backend doit cibler "my-postgres" car c'est le nom du conteneur DB dans l'app-network
      DB_HOST: "{{ DB_HOST }}"
      DB_USER: "{{ DB_USER }}"
      DB_PASSWORD: "{{ DB_PASSWORD }}"
      DB_NAME: "{{ DB_NAME }}"