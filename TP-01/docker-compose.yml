version: "3.9"

services:
  database:
    build: ./database
    container_name: my-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: my-backend-container
    restart: on-failure:3
    depends_on:
      - database
    env_file:
      - .env
    networks:
      - app-network
      - proxy-network

  httpd:
    build: ./httpd
    container_name: my-httpd
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - proxy-network

networks:
  app-network:
  proxy-network:

volumes:
  db_data: