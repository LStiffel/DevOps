name: CI devops 2025
on:
  #to begin you want to launch this job in main and develop
  push:
    branches: [main, develop] 
  pull_request:

jobs:
  test-backend: 
    runs-on: ubuntu-24.04
    steps:
     #checkout your github code using actions/checkout@v4
      - uses: actions/checkout@v4

     #do the same with another action (actions/setup-java@v4) that enable to setup jdk 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
        

     #finally build your app with the latest command
      - name: Build and test with Maven
        run: mvn clean verify --file TP-01/backend/pom.xml
      
  sonarcloud-scan:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven


      - name: SonarCloud-Scan
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=LStiffel_DevOps -Dsonar.organization=lstiffel -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}  --file TP-01/backend/pom.xml
  # define jobs to build and publish docker images
  build-and-push-docker-image-backend:
    needs: [test-backend]
    # run only when code is compiling and tests are passing
    runs-on: ubuntu-24.04

    # steps to perform in job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          # relative path to the place where source code with Dockerfile is located
          context: ./TP-01/backend
          # Note: tags has to be all lower-case
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/my-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/my-backend:${{ github.sha }}
          # build on feature branches, push only on main branch
          push: true

  build-and-push-docker-image-database:
    # run at the start (doesnt depend on the tests)
    runs-on: ubuntu-24.04

    # steps to perform in job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./TP-01/database
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/my-database:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/my-database:${{ github.sha }}
          push: true

  build-and-push-docker-image-httpd:
    # run at the start (doesnt depend on the tests)
    runs-on: ubuntu-24.04

    # steps to perform in job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./TP-01/httpd
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/my-httpd:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/my-httpd:${{ github.sha }}
          push: true

  build-and-push-docker-image-frontend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./TP-01/devops-front-main
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-front:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/devops-front:${{ github.sha }}

  deploy-infrastructure:
    needs: [build-and-push-docker-image-backend, build-and-push-docker-image-database, build-and-push-docker-image-httpd, build-and-push-docker-image-frontend]
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H leopold.stiffel.takima.school >> ~/.ssh/known_hosts

      - name: Overwrite inventory with GitHub Secret
        run: |
          echo "${{ secrets.ANSIBLE_INVENTORY }}" > TP-01/ansible/inventories/setup.yml

      - name: Create Vault Password File
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > TP-01/ansible/.vault_pass

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Run Ansible Playbook
        run: |
          cd TP-01/ansible
          ansible-playbook -i inventories/setup.yml playbook.yml